# ReleaseGuard policy for HDP TypeScript packages
# https://github.com/Helixar-AI/ReleaseGuard
#
# Scans built JS/TS artifacts before they are published to npm.
# Run locally: releaseguard check ./dist
version: 2

project:
  name: hdp
  mode: release

inputs:
  - path: ./dist
    type: directory

sbom:
  enabled: true
  ecosystems: [npm]
  formats: [cyclonedx]
  enrich_cve: false

scanning:
  exclude_paths:
    - dashboard/assets  # minified UI bundles — high-entropy strings are false positives
  secrets:
    enabled: false  # built-in no_secrets.rego flags Ed25519 keys and base64 blobs as entropy
                    # false positives in crypto library bundles — secret scanning is covered
                    # by GitHub Secret Scanning on the source repo
  metadata:
    enabled: true
    fail_on_source_maps: true
    fail_on_internal_urls: false
    fail_on_build_paths: false
  unexpected_files:
    enabled: true
    deny:
      - ".env"
      - "*.bak"
      - "*.tmp"
      - "*.key"
      - "*.pem"
  licenses:
    enabled: true
    require:
      - LICENSE

transforms:
  remove_source_maps: false
  add_checksums: true
  add_manifest: true

policy:
  fail_on:
    - severity: critical
  warn_on:
    - severity: high

output:
  reports:
    - cli
    - sarif
  directory: ./.releaseguard
