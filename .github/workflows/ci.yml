name: CI

on:
  push:
    branches: [main, "implement/**"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  test-hdp-crewai:
    name: Test hdp-crewai (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: packages/hdp-crewai
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/hdp-crewai
        run: pytest tests/ -v

  test-hdp-grok:
    name: Test hdp-grok (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: packages/hdp-grok
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/hdp-grok
        run: pytest tests/ -v

  test-hdp-physical:
    name: Test hdp-physical (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck hdp-physical
        run: cd packages/hdp-physical && npm run typecheck

      - name: Test hdp-physical
        run: cd packages/hdp-physical && npm test

      - name: Build hdp-physical
        run: cd packages/hdp-physical && npm run build

  test-hdp-autogen:
    name: Test hdp-autogen (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: packages/hdp-autogen
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/hdp-autogen
        run: pytest tests/ -v

  test-hdp-langchain:
    name: Test hdp-langchain (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: packages/hdp-langchain
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/hdp-langchain
        run: pytest tests/ -v

  test-llama-index-callbacks-hdp:
    name: Test llama-index-callbacks-hdp (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: packages/llama-index-callbacks-hdp
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/llama-index-callbacks-hdp
        run: pytest tests/ -v

  test-hdp-llamaindex:
    name: Test hdp-llamaindex (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: test-llama-index-callbacks-hdp
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install primary package
        working-directory: packages/llama-index-callbacks-hdp
        run: pip install -e ".[dev]"

      - name: Install metapackage
        working-directory: packages/hdp-llamaindex
        run: pip install -e .

      - name: Verify metapackage imports
        run: python -c "from hdp_llamaindex import HdpCallbackHandler, HdpInstrumentationHandler, HdpNodePostprocessor, verify_chain; print('hdp-llamaindex imports OK')"

  test-hdp-physical-py:
    name: Test hdp-physical-py (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: packages/hdp-physical-py
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/hdp-physical-py
        run: pytest tests/ -v
