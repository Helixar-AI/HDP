name: Release

on:
  push:
    tags:
      - 'v*'
      - 'python/v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-node:
    name: Test (Node)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  test-python:
    name: Test (Python)
    if: startsWith(github.ref, 'refs/tags/python/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: packages/hdp-crewai
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/hdp-crewai
        run: pytest tests/ -v

  publish-hdp:
    name: Publish @helixar_ai/hdp
    needs: test-node
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish @helixar_ai/hdp
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-hdp-mcp:
    name: Publish @helixar_ai/hdp-mcp
    needs: test-node
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build @helixar_ai/hdp (dependency)
        run: npm run build

      - name: Build @helixar_ai/hdp-mcp
        run: cd packages/hdp-mcp && npm run build

      - name: Publish @helixar_ai/hdp-mcp
        run: cd packages/hdp-mcp && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-hdp-cli:
    name: Publish hdp-validate CLI
    needs: test-node
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build @helixar_ai/hdp (dependency)
        run: npm run build

      - name: Build hdp-validate CLI
        run: cd packages/hdp-cli && npm run build

      - name: Publish hdp-validate
        run: cd packages/hdp-cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-hdp-crewai:
    name: Publish hdp-crewai to PyPI
    needs: test-python
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/hdp-crewai/
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build distribution
        working-directory: packages/hdp-crewai
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/hdp-crewai/dist/
