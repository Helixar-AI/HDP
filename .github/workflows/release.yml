name: Release

on:
  push:
    tags:
      - 'v*'
      - 'python/v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Node.js pipeline ──────────────────────────────────────────────────────

  test-node:
    name: Test (Node)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  vet-node:
    name: Build & Vet Node artifacts (ReleaseGuard)
    needs: test-node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Build hdp-mcp
        run: cd packages/hdp-mcp && npm run build

      - name: Build hdp-cli
        run: cd packages/hdp-cli && npm run build

      - name: Copy LICENSE into dist directories
        run: |
          cp LICENSE dist/
          cp LICENSE packages/hdp-mcp/dist/
          cp LICENSE packages/hdp-cli/dist/

      - name: Vet @helixar_ai/hdp
        uses: Helixar-AI/ReleaseGuard@e3b02c8e16d336cb9e8d241176ed225365ad5f19
        with:
          path: dist
          config: .releaseguard.yml
          sbom: 'true'
          fix: 'true'
          format: sarif

      - name: Vet @helixar_ai/hdp-mcp
        uses: Helixar-AI/ReleaseGuard@e3b02c8e16d336cb9e8d241176ed225365ad5f19
        with:
          path: packages/hdp-mcp/dist
          config: .releaseguard.yml
          sbom: 'true'
          fix: 'true'
          format: sarif

      - name: Vet hdp-validate CLI
        uses: Helixar-AI/ReleaseGuard@e3b02c8e16d336cb9e8d241176ed225365ad5f19
        with:
          path: packages/hdp-cli/dist
          config: .releaseguard.yml
          sbom: 'true'
          fix: 'true'
          format: sarif

      - name: Upload vetted hdp dist
        uses: actions/upload-artifact@v4
        with:
          name: hdp-dist
          path: dist/
          retention-days: 1

      - name: Upload vetted hdp-mcp dist
        uses: actions/upload-artifact@v4
        with:
          name: hdp-mcp-dist
          path: packages/hdp-mcp/dist/
          retention-days: 1

      - name: Upload vetted hdp-cli dist
        uses: actions/upload-artifact@v4
        with:
          name: hdp-cli-dist
          path: packages/hdp-cli/dist/
          retention-days: 1

  publish-hdp:
    name: Publish @helixar_ai/hdp
    needs: vet-node
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download vetted dist
        uses: actions/download-artifact@v4
        with:
          name: hdp-dist
          path: dist/

      - name: Publish @helixar_ai/hdp
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-hdp-mcp:
    name: Publish @helixar_ai/hdp-mcp
    needs: vet-node
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download vetted hdp dist (peer dependency)
        uses: actions/download-artifact@v4
        with:
          name: hdp-dist
          path: dist/

      - name: Download vetted hdp-mcp dist
        uses: actions/download-artifact@v4
        with:
          name: hdp-mcp-dist
          path: packages/hdp-mcp/dist/

      - name: Publish @helixar_ai/hdp-mcp
        run: cd packages/hdp-mcp && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-hdp-cli:
    name: Publish hdp-validate CLI
    needs: vet-node
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download vetted hdp-cli dist
        uses: actions/download-artifact@v4
        with:
          name: hdp-cli-dist
          path: packages/hdp-cli/dist/

      - name: Publish hdp-validate
        run: cd packages/hdp-cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Python pipeline ───────────────────────────────────────────────────────

  test-python:
    name: Test (Python)
    if: startsWith(github.ref, 'refs/tags/python/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: packages/hdp-crewai
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/hdp-crewai
        run: pytest tests/ -v

  vet-hdp-crewai:
    name: Build & Vet hdp-crewai (ReleaseGuard)
    needs: test-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build distribution
        working-directory: packages/hdp-crewai
        run: python -m build

      - name: Vet artifacts with ReleaseGuard
        uses: Helixar-AI/ReleaseGuard@e3b02c8e16d336cb9e8d241176ed225365ad5f19
        with:
          path: packages/hdp-crewai/dist
          config: packages/hdp-crewai/.releaseguard.yml
          sbom: 'true'
          fix: 'true'
          format: sarif

      - name: Upload vetted distribution
        uses: actions/upload-artifact@v4
        with:
          name: hdp-crewai-dist
          path: packages/hdp-crewai/dist/
          retention-days: 1

  publish-hdp-crewai:
    name: Publish hdp-crewai to PyPI
    needs: vet-hdp-crewai
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/hdp-crewai/
    steps:
      - name: Download vetted distribution
        uses: actions/download-artifact@v4
        with:
          name: hdp-crewai-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
