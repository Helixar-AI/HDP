name: Release

on:
  push:
    tags:
      - 'v*'
      - 'python/v*'
      - 'python/hdp-grok/v*'
      - 'python/hdp-langchain/v*'
      - 'python/hdp-autogen/v*'
      - 'python/hdp-physical/v*'
      - 'node/hdp-autogen/v*'
      - 'node/hdp-physical/v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  # ── Node.js pipeline ──────────────────────────────────────────────────────

  test-node:
    name: Test (Node)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  vet-node:
    name: Build & Vet Node artifacts (ReleaseGuard)
    needs: test-node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Build hdp-mcp
        run: cd packages/hdp-mcp && npm run build

      - name: Build hdp-cli
        run: cd packages/hdp-cli && npm run build

      - name: Build hdp-autogen-ts
        run: cd packages/hdp-autogen-ts && npm run build

      - name: Copy LICENSE into dist directories
        run: |
          cp LICENSE dist/
          cp LICENSE packages/hdp-mcp/dist/
          cp LICENSE packages/hdp-cli/dist/
          cp LICENSE packages/hdp-autogen-ts/dist/

      - name: Vet @helixar_ai/hdp
        uses: Helixar-AI/ReleaseGuard@94c067008f3ad516d4b61a6e7163d9d5518a4548
        with:
          path: dist
          config: .releaseguard.yml
          sbom: 'true'
          fix: 'true'
          format: sarif
          artifact-name: releaseguard-evidence-hdp

      - name: Vet @helixar_ai/hdp-mcp
        uses: Helixar-AI/ReleaseGuard@94c067008f3ad516d4b61a6e7163d9d5518a4548
        with:
          path: packages/hdp-mcp/dist
          config: .releaseguard.yml
          sbom: 'true'
          fix: 'true'
          format: sarif
          artifact-name: releaseguard-evidence-hdp-mcp

      - name: Vet hdp-validate CLI
        uses: Helixar-AI/ReleaseGuard@94c067008f3ad516d4b61a6e7163d9d5518a4548
        with:
          path: packages/hdp-cli/dist
          config: .releaseguard.yml
          sbom: 'true'
          fix: 'true'
          format: sarif
          artifact-name: releaseguard-evidence-hdp-cli

      - name: Upload vetted hdp dist
        uses: actions/upload-artifact@v4
        with:
          name: hdp-dist
          path: dist/
          retention-days: 1

      - name: Upload vetted hdp-mcp dist
        uses: actions/upload-artifact@v4
        with:
          name: hdp-mcp-dist
          path: packages/hdp-mcp/dist/
          retention-days: 1

      - name: Upload vetted hdp-cli dist
        uses: actions/upload-artifact@v4
        with:
          name: hdp-cli-dist
          path: packages/hdp-cli/dist/
          retention-days: 1

      - name: Vet @helixar_ai/hdp-autogen
        uses: Helixar-AI/ReleaseGuard@94c067008f3ad516d4b61a6e7163d9d5518a4548
        with:
          path: packages/hdp-autogen-ts/dist
          config: .releaseguard.yml
          sbom: 'true'
          fix: 'true'
          format: sarif
          artifact-name: releaseguard-evidence-hdp-autogen-ts

      - name: Upload vetted hdp-autogen-ts dist
        uses: actions/upload-artifact@v4
        with:
          name: hdp-autogen-ts-dist
          path: packages/hdp-autogen-ts/dist/
          retention-days: 1

  publish-hdp:
    name: Publish @helixar_ai/hdp
    needs: vet-node
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download vetted dist
        uses: actions/download-artifact@v4
        with:
          name: hdp-dist
          path: dist/

      - name: Publish @helixar_ai/hdp
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-hdp-mcp:
    name: Publish @helixar_ai/hdp-mcp
    needs: vet-node
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download vetted hdp dist (peer dependency)
        uses: actions/download-artifact@v4
        with:
          name: hdp-dist
          path: dist/

      - name: Download vetted hdp-mcp dist
        uses: actions/download-artifact@v4
        with:
          name: hdp-mcp-dist
          path: packages/hdp-mcp/dist/

      - name: Publish @helixar_ai/hdp-mcp
        run: cd packages/hdp-mcp && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-hdp-cli:
    name: Publish hdp-validate CLI
    needs: vet-node
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download vetted hdp-cli dist
        uses: actions/download-artifact@v4
        with:
          name: hdp-cli-dist
          path: packages/hdp-cli/dist/

      - name: Publish hdp-validate
        run: cd packages/hdp-cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-hdp-autogen-ts:
    name: Publish @helixar_ai/hdp-autogen
    needs: vet-node
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download vetted hdp dist (peer dependency)
        uses: actions/download-artifact@v4
        with:
          name: hdp-dist
          path: dist/

      - name: Download vetted hdp-autogen-ts dist
        uses: actions/download-artifact@v4
        with:
          name: hdp-autogen-ts-dist
          path: packages/hdp-autogen-ts/dist/

      - name: Publish @helixar_ai/hdp-autogen
        run: cd packages/hdp-autogen-ts && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── hdp-autogen-ts independent pipeline ───────────────────────────────────

  test-hdp-autogen-ts:
    name: Test hdp-autogen-ts
    if: startsWith(github.ref, 'refs/tags/node/hdp-autogen/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  vet-hdp-autogen-ts:
    name: Build & Vet hdp-autogen-ts (ReleaseGuard)
    needs: test-hdp-autogen-ts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Build hdp-autogen-ts
        run: cd packages/hdp-autogen-ts && npm run build

      - name: Copy LICENSE into dist directory
        run: cp LICENSE packages/hdp-autogen-ts/dist/

      - name: Vet @helixar_ai/hdp-autogen
        uses: Helixar-AI/ReleaseGuard@94c067008f3ad516d4b61a6e7163d9d5518a4548
        with:
          path: packages/hdp-autogen-ts/dist
          config: .releaseguard.yml
          sbom: 'true'
          fix: 'true'
          format: sarif
          artifact-name: releaseguard-evidence-hdp-autogen-ts

      - name: Upload vetted hdp-autogen-ts dist
        uses: actions/upload-artifact@v4
        with:
          name: hdp-autogen-ts-dist
          path: packages/hdp-autogen-ts/dist/
          retention-days: 1

  publish-hdp-autogen-ts-standalone:
    name: Publish @helixar_ai/hdp-autogen (standalone)
    needs: vet-hdp-autogen-ts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build root package (peer dependency)
        run: npm run build

      - name: Download vetted hdp-autogen-ts dist
        uses: actions/download-artifact@v4
        with:
          name: hdp-autogen-ts-dist
          path: packages/hdp-autogen-ts/dist/

      - name: Publish @helixar_ai/hdp-autogen
        run: cd packages/hdp-autogen-ts && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Python pipeline ───────────────────────────────────────────────────────

  test-python:
    name: Test (Python)
    if: startsWith(github.ref, 'refs/tags/python/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: packages/hdp-crewai
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/hdp-crewai
        run: pytest tests/ -v

  vet-hdp-crewai:
    name: Build & Vet hdp-crewai (ReleaseGuard)
    needs: test-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build distribution
        working-directory: packages/hdp-crewai
        run: python -m build

      - name: Vet artifacts with ReleaseGuard
        uses: Helixar-AI/ReleaseGuard@94c067008f3ad516d4b61a6e7163d9d5518a4548
        with:
          path: packages/hdp-crewai/dist
          config: packages/hdp-crewai/.releaseguard.yml
          sbom: 'true'
          fix: 'true'
          format: sarif

      - name: Upload vetted distribution
        uses: actions/upload-artifact@v4
        with:
          name: hdp-crewai-dist
          path: packages/hdp-crewai/dist/
          retention-days: 1

  publish-hdp-crewai:
    name: Publish hdp-crewai to PyPI
    needs: vet-hdp-crewai
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/hdp-crewai/
    steps:
      - name: Download vetted distribution
        uses: actions/download-artifact@v4
        with:
          name: hdp-crewai-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  test-hdp-grok:
    name: Test hdp-grok
    if: startsWith(github.ref, 'refs/tags/python/hdp-grok/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: packages/hdp-grok
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/hdp-grok
        run: pytest tests/ -v

  vet-hdp-grok:
    name: Build & Vet hdp-grok (ReleaseGuard)
    needs: test-hdp-grok
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build distribution
        working-directory: packages/hdp-grok
        run: python -m build

      - name: Vet artifacts with ReleaseGuard
        uses: Helixar-AI/ReleaseGuard@94c067008f3ad516d4b61a6e7163d9d5518a4548
        with:
          path: packages/hdp-grok/dist
          config: packages/hdp-grok/.releaseguard.yml
          sbom: 'true'
          fix: 'true'
          format: sarif
          artifact-name: releaseguard-evidence-hdp-grok

      - name: Upload vetted distribution
        uses: actions/upload-artifact@v4
        with:
          name: hdp-grok-dist
          path: packages/hdp-grok/dist/
          retention-days: 1

  publish-hdp-grok:
    name: Publish hdp-grok to PyPI
    needs: vet-hdp-grok
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi-hdp-grok
      url: https://pypi.org/project/hdp-grok/
    steps:
      - name: Download vetted distribution
        uses: actions/download-artifact@v4
        with:
          name: hdp-grok-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ── hdp-langchain (Python / LangChain) ───────────────────────────────────

  test-hdp-langchain:
    name: Test hdp-langchain
    if: startsWith(github.ref, 'refs/tags/python/hdp-langchain/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: packages/hdp-langchain
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/hdp-langchain
        run: pytest tests/ -v

  vet-hdp-langchain:
    name: Build & Vet hdp-langchain (ReleaseGuard)
    needs: test-hdp-langchain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build distribution
        working-directory: packages/hdp-langchain
        run: python -m build

      - name: Vet artifacts with ReleaseGuard
        uses: Helixar-AI/ReleaseGuard@94c067008f3ad516d4b61a6e7163d9d5518a4548
        with:
          path: packages/hdp-langchain/dist
          config: packages/hdp-langchain/.releaseguard.yml
          sbom: 'true'
          fix: 'true'
          format: sarif
          artifact-name: releaseguard-evidence-hdp-langchain

      - name: Upload vetted distribution
        uses: actions/upload-artifact@v4
        with:
          name: hdp-langchain-dist
          path: packages/hdp-langchain/dist/
          retention-days: 1

  publish-hdp-langchain:
    name: Publish hdp-langchain to PyPI
    needs: vet-hdp-langchain
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi-hdp-langchain
      url: https://pypi.org/project/hdp-langchain/
    steps:
      - name: Download vetted distribution
        uses: actions/download-artifact@v4
        with:
          name: hdp-langchain-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ── hdp-autogen (Python / AutoGen) ────────────────────────────────────────

  test-hdp-autogen:
    name: Test hdp-autogen
    if: startsWith(github.ref, 'refs/tags/python/hdp-autogen/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: packages/hdp-autogen
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/hdp-autogen
        run: pytest tests/ -v

  vet-hdp-autogen:
    name: Build & Vet hdp-autogen (ReleaseGuard)
    needs: test-hdp-autogen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build distribution
        working-directory: packages/hdp-autogen
        run: python -m build

      - name: Vet artifacts with ReleaseGuard
        uses: Helixar-AI/ReleaseGuard@94c067008f3ad516d4b61a6e7163d9d5518a4548
        with:
          path: packages/hdp-autogen/dist
          config: packages/hdp-autogen/.releaseguard.yml
          sbom: 'true'
          fix: 'true'
          format: sarif
          artifact-name: releaseguard-evidence-hdp-autogen

      - name: Upload vetted distribution
        uses: actions/upload-artifact@v4
        with:
          name: hdp-autogen-dist
          path: packages/hdp-autogen/dist/
          retention-days: 1

  publish-hdp-autogen:
    name: Publish hdp-autogen to PyPI
    needs: vet-hdp-autogen
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi-hdp-autogen
      url: https://pypi.org/project/hdp-autogen/
    steps:
      - name: Download vetted distribution
        uses: actions/download-artifact@v4
        with:
          name: hdp-autogen-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  # ── hdp-physical (TypeScript) ─────────────────────────────────────────────

  test-hdp-physical:
    name: Test hdp-physical
    if: startsWith(github.ref, 'refs/tags/node/hdp-physical/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  vet-hdp-physical:
    name: Build & Vet hdp-physical (ReleaseGuard)
    needs: test-hdp-physical
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build root package (peer dependency)
        run: npm run build

      - name: Build hdp-physical
        run: cd packages/hdp-physical && npm run build

      - name: Copy LICENSE into dist directory
        run: cp LICENSE packages/hdp-physical/dist/

      - name: Vet @helixar_ai/hdp-physical
        uses: Helixar-AI/ReleaseGuard@94c067008f3ad516d4b61a6e7163d9d5518a4548
        with:
          path: packages/hdp-physical/dist
          config: .releaseguard.yml
          sbom: 'true'
          fix: 'true'
          format: sarif
          artifact-name: releaseguard-evidence-hdp-physical

      - name: Upload vetted hdp-physical dist
        uses: actions/upload-artifact@v4
        with:
          name: hdp-physical-dist
          path: packages/hdp-physical/dist/
          retention-days: 1

  publish-hdp-physical:
    name: Publish @helixar_ai/hdp-physical
    needs: vet-hdp-physical
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build root package (peer dependency)
        run: npm run build

      - name: Download vetted hdp-physical dist
        uses: actions/download-artifact@v4
        with:
          name: hdp-physical-dist
          path: packages/hdp-physical/dist/

      - name: Publish @helixar_ai/hdp-physical
        run: cd packages/hdp-physical && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── hdp-physical (Python) ─────────────────────────────────────────────────

  test-hdp-physical-py:
    name: Test hdp-physical Python SDK
    if: startsWith(github.ref, 'refs/tags/python/hdp-physical/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: packages/hdp-physical-py
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/hdp-physical-py
        run: pytest tests/ -v

  vet-hdp-physical-py:
    name: Build & Vet hdp-physical Python (ReleaseGuard)
    needs: test-hdp-physical-py
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build distribution
        working-directory: packages/hdp-physical-py
        run: python -m build

      - name: Vet artifacts with ReleaseGuard
        uses: Helixar-AI/ReleaseGuard@94c067008f3ad516d4b61a6e7163d9d5518a4548
        with:
          path: packages/hdp-physical-py/dist
          config: packages/hdp-physical-py/.releaseguard.yml
          sbom: 'true'
          fix: 'true'
          format: sarif
          artifact-name: releaseguard-evidence-hdp-physical-py

      - name: Upload vetted distribution
        uses: actions/upload-artifact@v4
        with:
          name: hdp-physical-py-dist
          path: packages/hdp-physical-py/dist/
          retention-days: 1

  publish-hdp-physical-py:
    name: Publish hdp-physical to PyPI
    needs: vet-hdp-physical-py
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi-hdp-physical
      url: https://pypi.org/project/hdp-physical/
    steps:
      - name: Download vetted distribution
        uses: actions/download-artifact@v4
        with:
          name: hdp-physical-py-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
