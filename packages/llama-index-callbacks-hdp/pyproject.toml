[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "llama-index-callbacks-hdp"
version = "0.1.1"
description = "HDP (Human Delegation Provenance) — cryptographic authorization provenance for LlamaIndex agents"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
dependencies = [
    "llama-index-core>=0.10.20,<0.15",
    "cryptography>=42.0.0",
    "jcs>=0.2.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[project.urls]
Homepage = "https://github.com/Helixar-AI/HDP"
Repository = "https://github.com/Helixar-AI/HDP"

[tool.hatch.build.targets.wheel]
packages = ["llama_index"]

[tool.llamahub]
contains_example = false
import_path = "llama_index.callbacks.hdp"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
