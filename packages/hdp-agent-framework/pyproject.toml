[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hdp-agent-framework"
version = "0.1.0"
description = "HDP (Human Delegation Provenance) middleware for Microsoft agent-framework — cryptographic audit trail for multi-agent delegation"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
dependencies = [
    "agent-framework-core>=1.0",
    "cryptography>=42.0.0",
    "jcs>=0.2.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[project.urls]
Homepage = "https://github.com/Helixar-AI/HDP"
Repository = "https://github.com/Helixar-AI/HDP"
Documentation = "https://helixar.ai/about/labs/hdp/"

[tool.hatch.build.targets.wheel]
packages = ["src/hdp_agent_framework"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
